name: SpawnerSystem
version: ${project.version}
main: me.spawner.Spawner
api-version: '1.20'
author: onurr_k
description: Advanced and configurable spawner plugin.
folia-supported: true
softdepend:
  - LuckPerms

commands:
  spsystem:
    description: Main command for the Spawner System.
    aliases: [sps]
    permission: spawner.admin
    
permissions:
  spawner.menu:
    description: Allows access to the spawner settings menu for Auto-Kill and XP Collection features.
    default: op